<svg width="2064" height="512" viewBox="0 0 2064 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Forge banner</title>
  <desc id="desc">Forge turns agent instructions into a routing layer for Claude Code, Codex, CE, GSD, gstack, and Waza.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="2064" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.45" stop-color="#102A43"/>
      <stop offset="1" stop-color="#16113A"/>
    </linearGradient>
    <linearGradient id="hot" x1="258" y1="92" x2="560" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFB86B"/>
      <stop offset="0.5" stop-color="#FF6B3D"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="line" x1="800" y1="110" x2="1690" y2="402" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.5 0 1 0 0 0.25 0 0 1 0 1 0 0 0 0.55 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="2064" height="512" rx="48" fill="url(#bg)"/>
  <circle cx="1740" cy="-30" r="260" fill="#2563EB" opacity="0.18"/>
  <circle cx="145" cy="493" r="310" fill="#F97316" opacity="0.12"/>
  <path d="M0 409C280 336 384 420 604 342C824 264 870 102 1116 130C1362 158 1434 324 1646 268C1798 228 1904 104 2064 82V512H0V409Z" fill="#0EA5E9" opacity="0.08"/>

  <g filter="url(#glow)">
    <path d="M318 124H515L568 177V272C568 357 500 426 416 426C332 426 264 357 264 272V177L318 124Z" fill="url(#hot)" opacity="0.95"/>
    <path d="M327 181H504V270C504 319 464 359 416 359C368 359 328 319 328 270V181Z" fill="#07111F" opacity="0.86"/>
    <path d="M374 222H459L483 246V288H349V246L374 222Z" fill="#F8FAFC"/>
    <path d="M356 302H476V326H356V302Z" fill="#F8FAFC"/>
    <path d="M400 162H432V384H400V162Z" fill="#F97316"/>
  </g>

  <text x="668" y="205" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="92" font-weight="800" letter-spacing="0">Forge</text>
  <text x="672" y="265" fill="#D8E6F3" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="600">Router-first instructions for multi-agent development</text>
  <text x="672" y="322" fill="#98AECB" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25">Generate CLAUDE.md and AGENTS.md. Route each task to the right workflow.</text>

  <g opacity="0.96">
    <path d="M1524 239C1615 182 1689 182 1780 239C1872 296 1945 296 2037 239" stroke="url(#line)" stroke-width="5" stroke-linecap="round"/>
    <path d="M1524 312C1615 255 1689 255 1780 312C1872 369 1945 369 2037 312" stroke="url(#line)" stroke-width="5" stroke-linecap="round" opacity="0.65"/>
    <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="700">
      <rect x="1454" y="128" width="152" height="72" rx="24" fill="#0F172A" stroke="#38BDF8" stroke-opacity="0.55"/>
      <text x="1485" y="174" fill="#E0F2FE">Forge</text>
      <rect x="1698" y="92" width="122" height="64" rx="22" fill="#111827" stroke="#A78BFA" stroke-opacity="0.55"/>
      <text x="1734" y="133" fill="#F3E8FF">CE</text>
      <rect x="1868" y="126" width="126" height="64" rx="22" fill="#111827" stroke="#A78BFA" stroke-opacity="0.55"/>
      <text x="1906" y="167" fill="#F3E8FF">GSD</text>
      <rect x="1672" y="322" width="154" height="64" rx="22" fill="#111827" stroke="#F97316" stroke-opacity="0.6"/>
      <text x="1712" y="363" fill="#FFEDD5">gstack</text>
      <rect x="1884" y="310" width="142" height="64" rx="22" fill="#111827" stroke="#38BDF8" stroke-opacity="0.55"/>
      <text x="1920" y="351" fill="#E0F2FE">Waza</text>
    </g>
  </g>
</svg>
